{% extends "base.html" %}
{% block title %}我的點數{% endblock %}
{% block head %}
<style>
  .tab-btn { padding:8px 18px; border-radius:20px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); font-size:.9rem; cursor:pointer; font-weight:600; transition:all .15s; }
  .tab-btn.active { background:var(--light); border-color:var(--primary); color:var(--primary); }
  .pts-big { font-size:2rem; font-weight:900; color:var(--primary); }
  .tx-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--light); }
  .tx-row:last-child { border-bottom:none; }
  .tx-plus { color:var(--green); font-weight:700; font-size:1.1rem; }
  .tx-minus { color:var(--red); font-weight:700; font-size:1.1rem; }
  .reward-card { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .reward-pts { font-size:1.2rem; font-weight:800; color:var(--primary); white-space:nowrap; }
</style>
{% endblock %}
{% block content %}
<div class="page">
  <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
    <div style="font-size:2.5rem;">👤</div>
    <div>
      <div style="font-weight:700;font-size:1.1rem;">M{{ member.member_number }} {{ member.display_name }}</div>
      <div style="margin-top:4px;display:flex;align-items:baseline;gap:4px;">
        <span id="info-pts" class="pts-big">{{ member.points }}</span>
        <span class="muted">點</span>
      </div>
    </div>
    <a href="/member/logout" class="btn btn-outline btn-sm" style="margin-left:auto;">登出</a>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <div style="font-size:.9rem;font-weight:600;margin-bottom:8px;">📧 我的 Gmail（用來接收雲端教材）</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input id="gmail-input" type="email" value="{{ member.gmail or '' }}" placeholder="your@gmail.com"
        style="flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:.95rem;" />
      <button class="btn btn-primary btn-sm" onclick="saveGmail()">儲存</button>
    </div>
    <div id="gmail-msg" style="font-size:.82rem;margin-top:6px;color:var(--muted);"></div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <button class="tab-btn active" data-tab="redeem" onclick="switchTab('redeem')">🎁 兌換獎品</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">📋 點數紀錄</button>
    <button class="tab-btn" data-tab="rdhistory" onclick="switchTab('rdhistory')">🎀 兌換紀錄</button>
  </div>

  <div id="tab-redeem"><div id="rewards-list"></div></div>
  <div id="tab-history" style="display:none;"><div id="tx-list"></div></div>
  <div id="tab-rdhistory" style="display:none;"><div id="rd-list"></div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const curMno = {{ member.member_number }};
  let curPts = {{ member.points }};

  // 載入點數明細
  async function loadPoints() {
    const res = await fetch(`/api/member/${curMno}/points`);
    if (!res.ok) return;
    const data = await res.json();
    curPts = data.points;
    document.getElementById("info-pts").textContent = data.points;
    renderTx(data.transactions);
    renderRdHistory(data.redemptions);
  }

  function renderTx(txs) {
    const el = document.getElementById("tx-list");
    if (!txs.length) { el.innerHTML = `<div class="muted" style="padding:20px 0;text-align:center;">還沒有點數紀錄</div>`; return; }
    el.innerHTML = `<div class="card">${txs.map(t => `
      <div class="tx-row">
        <div><div style="font-size:.92rem;">${esc(t.reason || "—")}</div><div class="muted" style="font-size:.8rem;">${esc(t.created_at)}</div></div>
        <div class="${t.delta > 0 ? 'tx-plus' : 'tx-minus'}">${t.delta > 0 ? '+' : ''}${t.delta}</div>
      </div>`).join("")}</div>`;
  }

  function renderRdHistory(rds) {
    const el = document.getElementById("rd-list");
    if (!rds || !rds.length) { el.innerHTML = `<div class="muted" style="padding:20px 0;text-align:center;">還沒有兌換紀錄</div>`; return; }
    el.innerHTML = `<div class="card">${rds.map(r => `
      <div class="tx-row">
        <div style="flex:1;min-width:0;">
          <div style="font-size:.92rem;font-weight:600;">${esc(r.reward_name)}</div>
          <div class="muted" style="font-size:.8rem;">${esc(r.created_at)}</div>
          ${r.redemption_url ? `<a href="${esc(r.redemption_url)}" target="_blank" style="font-size:.85rem;color:var(--primary);">📎 取得兌換內容</a>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span style="color:var(--red);font-weight:700;">-${r.points_used}</span>
          <span class="badge ${r.fulfilled ? 'badge-green' : 'badge-red'}">${r.fulfilled ? '已發放' : '待發放'}</span>
        </div>
      </div>`).join("")}</div>`;
  }

  async function loadRewards() {
    const res = await fetch("/api/rewards");
    const rewards = await res.json();
    const el = document.getElementById("rewards-list");
    if (!rewards.length) { el.innerHTML = `<div class="muted" style="padding:20px 0;text-align:center;">目前沒有可兌換的獎品</div>`; return; }
    el.innerHTML = rewards.map(r => {
      const canAfford = curPts >= r.points_required;
      const soldOut = r.remaining === 0;
      const disabled = !canAfford || soldOut;
      const stock = r.remaining === -1 ? "" : `（剩 ${r.remaining} 個）`;
      return `<div class="card reward-card">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;">${esc(r.name)}${stock}</div>
          ${r.description ? `<div class="muted">${esc(r.description)}</div>` : ""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
          <div class="reward-pts">${r.points_required} 點</div>
          <button class="btn btn-primary btn-sm" onclick="redeem(${r.id},'${esc(r.name)}',${r.points_required})"
            ${disabled ? "disabled" : ""}>${soldOut ? "已售完" : canAfford ? "兌換" : "點數不足"}</button>
        </div>
      </div>`;
    }).join("");
  }

  async function redeem(rid, name, pts) {
    if (!confirm(`確定要用 ${pts} 點兌換「${name}」嗎？`)) return;
    const res = await fetch(`/api/redeem/${rid}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ member_number: curMno }) });
    const data = await res.json();
    if (data.ok) {
      if (data.redemption_url) {
        toast(`兌換成功！<br><a href="${data.redemption_url}" target="_blank" style="color:#ffe09a;text-decoration:underline;">📎 點此取得兌換內容</a>`, 10000);
      } else {
        toast("兌換成功！管理員將盡快為你處理 🎁");
      }
      await loadPoints();
      await loadRewards();
    } else {
      toast("⚠️ " + data.error);
    }
  }

  function switchTab(tab) {
    ["redeem", "history", "rdhistory"].forEach(t => {
      document.querySelector(`[data-tab="${t}"]`).classList.toggle("active", t === tab);
      document.getElementById(`tab-${t}`).style.display = t === tab ? "" : "none";
    });
  }

  async function saveGmail() {
    const gmail = document.getElementById("gmail-input").value.trim();
    const msg = document.getElementById("gmail-msg");
    const res = await fetch("/api/member/gmail", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ gmail }) });
    const data = await res.json();
    if (data.ok) { msg.style.color = "var(--green)"; msg.textContent = "✓ 已儲存"; }
    else { msg.style.color = "var(--red)"; msg.textContent = data.error; }
  }

  loadPoints();
  loadRewards();
</script>
{% endblock %}
