<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}蒙芽共讀資料庫{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0eb; --card: #fff; --primary: #a07848; --primary-dk: #7a5830;
      --text: #3a3020; --muted: #7a6a58; --light: #f0e8d8; --border: #d4c4b0;
      --red: #c0392b; --green: #27ae60;
    }
    body { font-family: -apple-system,"Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    nav {
      background:var(--card); border-bottom:1px solid var(--border);
      padding:0 16px; display:flex; align-items:center;
      justify-content:space-between; height:52px;
      position:sticky; top:0; z-index:100;
    }
    .nav-brand { font-size:1rem; font-weight:700; color:var(--primary); text-decoration:none; }
    .nav-links { display:flex; gap:4px; align-items:center; }
    .nav-links a {
      padding:6px 12px; border-radius:8px; font-size:.9rem;
      color:var(--muted); text-decoration:none; transition:background .15s;
    }
    .nav-links a:hover, .nav-links a.active { background:var(--light); color:var(--primary); }
    .page { max-width:720px; margin:0 auto; padding:24px 16px 60px; }
    .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
    .btn { display:inline-block; padding:10px 20px; border-radius:10px; font-size:.95rem; font-weight:600; border:none; cursor:pointer; text-decoration:none; transition:background .15s; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-dk); }
    .btn-outline { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
    .btn-outline:hover { background:var(--light); }
    .btn-sm { padding:6px 14px; font-size:.85rem; border-radius:8px; }
    .btn-danger { background:var(--red); color:#fff; }
    .btn-success { background:var(--green); color:#fff; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    input, textarea, select { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:.95rem; background:#fff; color:var(--text); outline:none; transition:border-color .15s; }
    input:focus, textarea:focus, select:focus { border-color:var(--primary); }
    label { font-size:.85rem; color:var(--muted); display:block; margin-bottom:4px; }
    .form-group { margin-bottom:12px; }
    .badge { display:inline-block; background:var(--light); color:var(--primary); font-size:.75rem; font-weight:700; padding:2px 10px; border-radius:20px; }
    .badge-green { background:#d4f0db; color:var(--green); }
    .badge-red { background:#fde8e6; color:var(--red); }
    .muted { color:var(--muted); font-size:.85rem; }
    .mt8 { margin-top:8px; } .mt16 { margin-top:16px; } .mt24 { margin-top:24px; }
    mark { background:#ffe09a; border-radius:3px; padding:0 2px; }
    #toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:#333; color:#fff; padding:12px 22px;
      border-radius:20px; font-size:.9rem; opacity:0;
      transition:opacity .3s,transform .3s; z-index:9999;
      pointer-events:none; white-space:normal; max-width:90vw; text-align:center; line-height:1.6;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">📚 蒙芽共讀</a>
    <div class="nav-links">
      <a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>搜尋</a>
      <a href="/member" {% if request.endpoint=='member_page' %}class="active"{% endif %}>我的點數</a>
      {% if session.get('admin_authenticated') %}
      <a href="/admin" {% if request.endpoint and 'admin' in request.endpoint %}class="active"{% endif %}>後台</a>
      <a href="/admin/logout">登出後台</a>
      {% endif %}
    </div>
  </nav>
  {% block content %}{% endblock %}
  <div id="toast"></div>
  <script>
    function toast(msg, ms=2800) {
      const el=document.getElementById("toast");
      el.innerHTML=msg; el.classList.add("show");
      setTimeout(()=>el.classList.remove("show"),ms);
    }
    function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function highlight(text,q){
      if(!q) return esc(text);
      const safe=q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
      return esc(text).replace(new RegExp(safe,"gi"),m=>`<mark>${m}</mark>`);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
