{% extends "base.html" %}
{% block title %}申請帳號{% endblock %}
{% block content %}
<div class="page" style="max-width:400px;">
  <div class="card" style="margin-top:40px;">
    <h2 style="font-size:1.2rem;margin-bottom:8px;">📝 申請帳號</h2>
    <p class="muted" style="margin-bottom:20px;">用你的 M 編號設定密碼，之後就能查看點數與兌換紀錄</p>
    <form method="POST" action="/member/register">
      <div class="form-group">
        <label>M 編號（管理員給你的編號）</label>
        <input type="number" name="member_number" placeholder="例如：97" min="1" autofocus />
      </div>
      <div class="form-group">
        <label>設定密碼（至少 4 個字）</label>
        <input type="password" name="password" />
      </div>
      <div class="form-group">
        <label>再輸入一次密碼</label>
        <input type="password" name="password2" />
      </div>
      {% if error %}<div style="color:var(--red);font-size:.9rem;margin-bottom:12px;">{{ error }}</div>{% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;">申請並登入</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:.9rem;color:var(--muted);">
      已有密碼？<a href="/member/login" style="color:var(--primary);">直接登入</a>
    </div>
  </div>
</div>
{% endblock %}
