{% extends "base.html" %}
{% block title %}我的點數{% endblock %}

{% block content %}
<div class="page">
  <!-- 個人資訊 + 點數 -->
  <div class="card" style="display:flex; align-items:center; gap:14px; margin-bottom:20px;">
    {% if user.picture_url %}
      <img src="{{ user.picture_url }}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border);" />
    {% else %}
      <div style="width:56px;height:56px;border-radius:50%;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:1.8rem;">👤</div>
    {% endif %}
    <div>
      <div style="font-weight:700;font-size:1.1rem;">{{ user.display_name }}</div>
      <div style="margin-top:4px;">
        <span id="points-badge" style="font-size:1.5rem;font-weight:800;color:var(--primary);">…</span>
        <span class="muted" style="font-size:0.9rem;"> 點</span>
      </div>
    </div>
  </div>

  <!-- 分頁標籤 -->
  <div style="display:flex;gap:8px;margin-bottom:20px;">
    <button class="tab-btn active" data-tab="redeem" onclick="switchTab('redeem')">🎁 兌換獎品</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">📋 點數紀錄</button>
  </div>

  <!-- 兌換獎品 -->
  <div id="tab-redeem">
    <div id="rewards-list"></div>
  </div>

  <!-- 點數紀錄 -->
  <div id="tab-history" style="display:none;">
    <div id="transactions-list"></div>
  </div>
</div>
{% endblock %}

{% block head %}
<style>
  .tab-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--light);
    border-color: var(--primary);
    color: var(--primary);
  }

  .reward-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .reward-info { flex: 1; min-width: 0; }
  .reward-name { font-weight: 700; font-size: 1rem; }
  .reward-desc { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .reward-pts { font-size: 1.2rem; font-weight: 800; color: var(--primary); white-space: nowrap; }

  .tx-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--light); }
  .tx-row:last-child { border-bottom: none; }
  .tx-delta { font-weight:700; font-size:1.1rem; }
  .tx-plus { color: var(--green); }
  .tx-minus { color: var(--red); }
</style>
{% endblock %}

{% block scripts %}
<script>
  let userPoints = 0;

  async function loadMe() {
    const res = await fetch("/api/me");
    const data = await res.json();
    userPoints = data.user.points;
    document.getElementById("points-badge").textContent = userPoints;
    renderTransactions(data.transactions);
  }

  function renderTransactions(txs) {
    const el = document.getElementById("transactions-list");
    if (!txs.length) {
      el.innerHTML = `<div class="muted" style="text-align:center;padding:32px 0;">還沒有點數紀錄</div>`;
      return;
    }
    el.innerHTML = `<div class="card">${txs.map(t => `
      <div class="tx-row">
        <div>
          <div style="font-size:0.92rem;">${esc(t.reason || "—")}</div>
          <div class="muted" style="font-size:0.8rem;">${esc(t.created_at)}</div>
        </div>
        <div class="tx-delta ${t.delta > 0 ? 'tx-plus' : 'tx-minus'}">
          ${t.delta > 0 ? '+' : ''}${t.delta}
        </div>
      </div>`).join("")}</div>`;
  }

  async function loadRewards() {
    const res = await fetch("/api/rewards");
    const rewards = await res.json();
    const el = document.getElementById("rewards-list");
    if (!rewards.length) {
      el.innerHTML = `<div class="muted" style="text-align:center;padding:32px 0;">目前沒有可兌換的獎品</div>`;
      return;
    }
    el.innerHTML = rewards.map(r => {
      const canAfford = userPoints >= r.points_required;
      const soldOut = r.remaining === 0;
      const disabled = !canAfford || soldOut;
      const stockText = r.remaining === -1 ? "" : `（剩 ${r.remaining} 個）`;
      return `<div class="card reward-card">
        <div class="reward-info">
          <div class="reward-name">${esc(r.name)}${stockText}</div>
          ${r.description ? `<div class="reward-desc">${esc(r.description)}</div>` : ""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
          <div class="reward-pts">${r.points_required} 點</div>
          <button class="btn btn-primary btn-sm" onclick="redeem(${r.id}, '${esc(r.name)}', ${r.points_required})"
            ${disabled ? "disabled" : ""}>${soldOut ? "已售完" : canAfford ? "兌換" : "點數不足"}</button>
        </div>
      </div>`;
    }).join("");
  }

  async function redeem(rewardId, name, pts) {
    if (!confirm(`確定要用 ${pts} 點兌換「${name}」嗎？`)) return;
    const res = await fetch(`/api/redeem/${rewardId}`, { method: "POST" });
    const data = await res.json();
    if (data.ok) {
      toast(data.message);
      await loadMe();
      await loadRewards();
    } else {
      toast("⚠️ " + data.error);
    }
  }

  function switchTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    document.getElementById("tab-redeem").style.display  = tab === "redeem"  ? "" : "none";
    document.getElementById("tab-history").style.display = tab === "history" ? "" : "none";
  }

  loadMe().then(() => loadRewards());
</script>
{% endblock %}
